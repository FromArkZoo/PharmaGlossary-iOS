# Single-target unified app. Pharma's bundle ID is preserved so the live
# App Store listing (com.jamesbrowne.PharmaGlossary) receives this as an
# update — Pharma's reviews and existing users carry forward as JB Glossary.
# Old Targets/{AI,Law,Finance}/{Industry}Brand.swift files are no longer
# compiled (Sources/ is the only sources path).
name: JBGlossary
options:
  bundleIdPrefix: com.jamesbrowne
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  generateEmptyDirectories: false
  developmentLanguage: en
settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MARKETING_VERSION: "2.0.0"
    CURRENT_PROJECT_VERSION: "3"
    ENABLE_USER_SCRIPT_SANDBOXING: NO
targets:
  JBGlossary:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Sources
      - path: Targets/Pharma/Resources/Assets.xcassets
      - path: Targets/Pharma/Resources/PrivacyInfo.xcprivacy
      - path: Targets/Pharma/Resources/glossary_pharma.json
      - path: Targets/AI/Resources/glossary_ai.json
      - path: Targets/Law/Resources/glossary_law.json
      - path: Targets/Finance/Resources/glossary_finance.json
    info:
      path: Targets/Pharma/Resources/Info.plist
      properties:
        CFBundleDisplayName: JB Glossary
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        UIUserInterfaceStyle: Light
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jamesbrowne.PharmaGlossary
        TARGETED_DEVICE_FAMILY: "1,2"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_TEAM: 278RL79DB5
    scheme:
      # Local sandbox: every Run uses Configuration.storekit so the 4 IAPs
      # load with mock prices in the simulator without ASC setup.
      storeKitConfiguration: Configuration.storekit
